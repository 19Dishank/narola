<!DOCTYPE html>
<html lang="en">
<style>
    #myDIV {
        width: 100%;
        height: 100px;
        background: orange;
        position: relative;
        font-size: 18px;
        padding: 16px;
    }

    @keyframes mymove {
        from {
            top: 0px;
        }

        to {
            top: 200px;
        }
    }

    .droptarget {
        width: 100px;
        height: 35px;
        padding: 10px;
        border: 1px solid black;
    }

    #fullscreenText {
        background-color: yellow;
        padding: 20px;
        font-size: 30px;
    }
</style>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events</title>
</head>

<body onbeforeprint="printFun()" onafterprint="afterPrintFun()" onresize="resizeFun()" onclick="WhichButton(event)">
    <a id="link" href="https://www.w3schools.com" target="_blank">w3schools</a>
    <div id="myDIV" onclick="myFunction()">Click me to start the animation.<br>Right click wont work in this div</div>
    <br>
    <form onreset="onResetFun()">

        <input type="text" id="input" required onblur="onBlur()" onselect="onSelect(event)"
            placeholder="Try copy,paste,cut" oncopy="copyFun()" oncut="cutFun()" onpaste="pasteFUn()"
            onfocus="onFocusFun()" onkeyup="onKeyUpFun(event)" onfocusout="onFocusOut()" oninput="onInput()" />
        <select id="mySelect" onchange="onChangeFun()">
            <option value="Audi">Audi</option>
            <option value="BMW">BMW</option>
            <option value="Mercedes">Mercedes</option>
            <option value="Volvo">Volvo</option>
        </select>
        <button type="reset" value="reset">reset</button>
    </form>
    <p id="demo"></p>
    <p id="demo2"></p>
    <p id="demo3"></p>
    <p id="demo4"></p>
    <p id="anim"></p>
    <div class="droptarget" ondrop="drop(event)" ondragover="allowDrop(event)">
        <p id="dragtarget" draggable="true" ondragstart="dragStart(event)" ondrag="onDragging(event)">drag me</p>
    </div><br>
    <div class="droptarget" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    <p id="dragtext"></p>
    <audio controls onended="myAudioFun()">
        <source src="horse.ogv" type="audio/ogv">
        <source src="horse.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    <p id="audiotext"></p>
    <img src="image.jpg" onerror="alert('image not found')">
    <button onclick="openFullscreen();">Go Fullscreen Mode</button>
    <button onclick="closeFullscreen();">Close Fullscreen</button>
    <p id="fullscreenText">Window Mode</p>
    <form action="demo.txt" method="get" target="_blank">
        Name: <input type="text" oninvalid="alert('You must fill out the form!');" name="fname" required>
        <input type="submit" value="Submit">
    </form>
    <script>
        let fsText = document.getElementById('fullscreenText');
        document.addEventListener("fullscreenchange", function () {
            fsText.innerHTML = "Window is in FullScreen"
        })
        let fs = document.documentElement;
        function openFullscreen() {
            if (fs.requestFullscreen) {
                fs.requestFullscreen()
            }
        }
        function closeFullscreen() {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }
        function myAudioFun() {
            document.getElementById('audiotext').innerHTML = "Audio Ended..";
        }
        function dragStart(event) {
            event.dataTransfer.setData("Text", event.target.id);
        }
        function onDragging(event) {
            document.getElementById('dragtext').innerHTML = "object is being Dragged";
        }
        function allowDrop(event) {
            event.preventDefault();
        }
        function drop(event) {
            event.preventDefault();
            const data = event.dataTransfer.getData("Text");
        }
