<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INC DEC</title>
    <script src="incDec.js" defer></script>

</head>

<body>
    <h3 id="countDiv">Count : </h3>

    <div>
        <label for="pwd">Enter Password</label>

        <button id="pwdBtn" onclick="hideShow()">Show Password</button>
    </div>
    <hr>
    <h4>Palindrome Checker</h4>
    <input type="text" name="" id="pali">
    <p id="paliRes"></p>
    <button onclick="checkPalindrome()">Check</button>

    <input type="email" name="" id="email" placeholder="Email Validator" required>
    <p id="emailRes"></p>
    <button id="emailBtn" onclick="varifyEmail()">Submit</button>

    <button onclick="randomNumber()">generate OTP</button>
    <p id="randNum"></p>
    <hr>
    <div id="inputs" class="inputs">
        <input type="text" inputmode="numeric" maxlength="1" style="width: 20px; height: 20px; text-align: center;">
        <input type="text" inputmode="numeric" maxlength="1" style="width: 20px; height: 20px; text-align: center;">
        <input type="text" inputmode="numeric" maxlength="1" style="width: 20px; height: 20px; text-align: center;">
        <input type="text" inputmode="numeric" maxlength="1" style="width: 20px; height: 20px; text-align: center;">
        <input type="text" inputmode="numeric" maxlength="1" style="width: 20px; height: 20px; text-align: center;">
        <input type="text" inputmode="numeric" maxlength="1" style="width: 20px; height: 20px; text-align: center;">
    </div>
    <hr>
    <p id="demo" style="font-size: 20px;">This is Demo Text Click buttons and increse or decrese size of this sentence</p>
    <button id="plus" onclick="incTxtFun()">+</button>
    <button id="minus" onclick="decTxtFun()">-</button>
</body>

</html>
