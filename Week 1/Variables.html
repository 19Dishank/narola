<html>
    <head>
        <script>
         let a = "hello using let ";
         var b = 3;
         const c = a + b;
         let _a = "using underscore";
         let $ = "using dollar";
        </script>
    </head>
    <body>
        <h1>Variables</h1>
        <p id="demo"></p>
        <button type="button" onclick="document.getElementById('demo').innerHTML = a +'<br>' + b +'<br>' + c +'<br>' + _a +'<br>'+ $ ">click</button>
        
    </body>
</html>
