<!DOCTYPE html>

<html>
    <head>
       
    </head>
    <body>
        <p id="demo1"></p>
        <p id="demo2"></p>
        <p id="demo3"></p>
        <p id="demo4"></p>
        <p id="demo5"></p>
        <h3>Const can be used to declare Arrays and Objects</h3>
        <p id="demo6"></p>
        <p id="demo7"></p>
        <script>
        var x = 10;
        document.getElementById('demo1').innerHTML = x; // return 10
        {
            var x = 100;
        }
        document.getElementById('demo2').innerHTML = x; // return 100
        const a = 10;
        document.getElementById('demo3').innerHTML = a; // return 10
        {
            const a = 100;
            document.getElementById('demo4').innerHTML = a; // return 100
        }
        document.getElementById('demo5').innerHTML = a; // return 10
        const arr = ['Jan','Feb','Mar','Apr'];
        document.getElementById('demo6').innerHTML = arr; 
        const person = {
            name:"Dishank",
            age:21,
            role:"Trainee  SE"
        };
        document.getElementById('demo7').innerHTML = person.name + " is " + person.role; 
       </script>
    </body>
</html>
